<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Контактна інформація Марії Бондаренко та форма зворотного зв'язку">

    <title>Контакти — Портфоліо</title>

<body>
    <header>
        <h1>Марія Бондаренко</h1>
        <nav>
            <ul>

                <li><a href="about.html">Про мене</a></li>
                <li><strong>Контакти</strong></li>
            </ul>
        </nav>
    </header>
<main>
        <section id="map-section">
            <div class="contact-form-container">
                <h2>Напишіть нам</h2>
                <form action="#" method="post">
                    <div>
                        <input type="email" name="email" placeholder="Ваш Email" required>
                    </div>
                    <div>
                        <select name="subject">
                            <option value="">Оберіть тему</option>
                            <option value="general">Загальне питання</option>
                            <option value="cooperation">Співпраця</option>
                        </select>
                    </div>
                    <div>
                        <textarea name="message" placeholder="Ваше повідомлення"></textarea>
                    </div>
                    <button type="submit">Надіслати</button>
                </form>
            </div>
	
        </section>
        <section id="contact-info">
            <div class="info-block">
                <h3>Телефон</h3>
                <p>+38 (000) 000-00-00</p>
            </div>

            <div class="info-block">
                <h3>Електронна пошта</h3>
                <p>masha06bondarenko@gmail.com</p>
            </div>
        </section>
    </main>

    <footer>

    </footer>
